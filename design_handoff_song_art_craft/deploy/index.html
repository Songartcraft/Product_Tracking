<body>
<div id="frame"></div>
<input type="file" accept="image/*" capture="environment" id="fileIn" style="display:none;">
<canvas id="canvas" style="display:none;"></canvas>

<script>
let SHOP = 'Song Art & Craft';
const CUR = '£';
let CATS = ['Glass Flower', 'Glass Petals', 'Glass Artifact'];
let LOGO = '';
let REQD = new Set();
function applyConfig(d) {
  if (d.shop_name) SHOP = d.shop_name;
  if (d.categories && d.categories.length) CATS = d.categories.map(c => c.name);
  if (d.logo_url !== undefined) LOGO = d.logo_url || '';
  if (d.delete_requests) REQD = new Set(d.delete_requests.map(x => x.purchase_id));
}

const S = {
  booted: false,
  employee: null,
  screen: 'gate',
  pin: '', codeError: '', shake: false,
  menuOpen: false,
  makers: [], records: [],
  draftPhoto: null,
  form: { category: '', makerId: '', price: '', qty: 1, payment: 'Cash', note: '' },
  editingId: null, detailId: null, backTo: 'records',
  confirmDelete: false,
  toast: '', busy: false,
};
let stream = null, toastTimer = null, checking = false;

const $ = s => document.querySelector(s);
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const money = n => CUR + Number(n || 0).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = ts => new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
const fmtTime = ts => new Date(ts).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
const isToday = ts => new Date(ts).toDateString() === new Date().toDateString();

async function api(path, opts = {}) {
  const r = await fetch('/api/' + path, { credentials:'same-origin', headers:{ 'content-type':'application/json' }, ...opts });
  let j = null; try { j = await r.json(); } catch (e) {}
  if (!r.ok) throw new Error((j && j.error) || 'Request failed');
  return j;
}

function mapPurchase(p) {
  return {
    id: p.id, photo: p.photo_url || null, category: p.category,
    price: Number(p.price), qty: p.quantity, payment: p.payment, note: p.note || '',
    makerId: p.maker_id, maker: (p.makers && p.makers.name) || SHOP,
    employee: p.employees ? (p.employees.first_name + ' ' + p.employees.last_name) : '—',
    ts: new Date(p.created_at).getTime(),
    updatedTs: p.updated_at ? new Date(p.updated_at).getTime() : null,
    history: (p.purchase_history || []).map(h => ({
      ts: new Date(h.created_at).getTime(), category: h.category, price: Number(h.price),
      qty: h.quantity, payment: h.payment, note: h.note || '', maker: h.maker_name,
    })),
  };
}

async function boot() {
  try {
    const d = await api('bootstrap');
    applyConfig(d);
    if (d.session && d.session.t === 'staff') {
      S.employee = { id: d.session.id, name: d.session.name, role: d.session.role };
      S.makers = d.makers || [];
      S.records = (d.purchases || []).map(mapPurchase);
      if (S.screen === 'gate') S.screen = 'home';
    }
  } catch (e) {}
  S.booted = true;
  render();
}
async function refresh() {
  const d = await api('bootstrap');
  applyConfig(d);
  S.makers = d.makers || [];
  S.records = (d.purchases || []).map(mapPurchase);
}

function notify(msg) { clearTimeout(toastTimer); S.toast = msg; render(); toastTimer = setTimeout(() => { S.toast = ''; render(); }, 2600); }

/* ---------- PIN ---------- */
function key(d) {
  if (S.pin.length >= 6) return;
  S.pin += d; S.codeError = ''; render();
}
function backspace() { S.pin = S.pin.slice(0, -1); S.codeError = ''; render(); }
async function attempt() {
  if (checking) return;
  if (S.pin.length < 4) {
    S.codeError = 'Enter your 4–6 digit passkey.';
    S.shake = true; render(); setTimeout(() => { S.shake = false; render(); }, 450);
    return;
  }
  checking = true;
  try {
    const d = await api('staff/login', { method:'POST', body: JSON.stringify({ passkey: S.pin }) });
    S.employee = { id: d.employee.id, name: d.employee.name, role: d.employee.role };
    S.pin = ''; S.codeError = '';
    await refresh();
    S.screen = 'home'; render();
  } catch (e) {
    S.pin = ''; S.codeError = 'Passkey not recognised. Try again.';
    S.shake = true; render(); setTimeout(() => { S.shake = false; render(); }, 450);
  } finally { checking = false; }
}
async function signOut() {
  try { await api('logout', { method:'POST' }); } catch (e) {}
  stopCam(); Object.assign(S, { employee:null, screen:'gate', pin:'', menuOpen:false, records:[], draftPhoto:null, editingId:null, detailId:null });
  render();
}

/* ---------- Camera ---------- */
async function startCapture() {
  S.menuOpen = false; S.editingId = null; S.screen = 'capture'; render();
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const v = $('#vid'); if (v) { v.srcObject = stream; $('#capOff').style.display = 'none'; }
  } catch (e) { stream = null; }
}
function stopCam() { if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; } }
function shutter() {
  if (stream) {
    const v = $('#vid'), c = $('#canvas');
    const w = v.videoWidth, h = v.videoHeight;
    if (w) {
      const scale = Math.min(1, 1280 / Math.max(w, h));
      c.width = Math.round(w * scale); c.height = Math.round(h * scale);
      c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
      S.draftPhoto = c.toDataURL('image/jpeg', 0.82);
      stopCam(); toForm(); return;
    }
  }
  $('#fileIn').click();
}
function onFile(ev) {
  const f = ev.target.files[0]; if (!f) return;
  const img = new Image();
  img.onload = () => {
    const c = $('#canvas');
    const scale = Math.min(1, 1280 / Math.max(img.width, img.height));
    c.width = Math.round(img.width * scale); c.height = Math.round(img.height * scale);
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    S.draftPhoto = c.toDataURL('image/jpeg', 0.82);
    stopCam(); toForm();
  };
  img.src = URL.createObjectURL(f);
  ev.target.value = '';
}
function cancelCapture() { stopCam(); S.screen = S.editingId ? 'detail' : 'home'; render(); }

/* ---------- Form ---------- */
function defaultMakerId() { const d = S.makers.find(m => m.is_default); return d ? d.id : (S.makers[0] && S.makers[0].id) || ''; }
function toForm() {
  if (!S.editingId) S.form = { category:'', makerId: defaultMakerId(), price:'', qty:1, payment:'Cash', note:'' };
  S.screen = 'form'; render();
}
function editRecord() {
  const r = S.records.find(x => x.id === S.detailId); if (!r) return;
  S.editingId = r.id; S.draftPhoto = r.photo;
  S.form = { category: r.category, makerId: r.makerId, price: String(r.price), qty: r.qty, payment: r.payment, note: r.note };
  S.screen = 'form'; render();
}
function formBack() { S.screen = S.editingId ? 'detail' : 'capture'; if (S.screen === 'capture') startCapture(); else render(); }
function formValid() { return !!S.form.category && Number(S.form.price) > 0; }
async function submitForm() {
  if (!formValid() || S.busy) return;
  S.busy = true; render();
  try {
    if (S.editingId) {
      await api('purchases/' + S.editingId, { method:'PATCH', body: JSON.stringify({
        category: S.form.category, maker_id: S.form.makerId, price: S.form.price,
        quantity: S.form.qty, payment: S.form.payment, note: S.form.note,
        ...(S.draftPhoto !== undefined ? { photo_url: S.draftPhoto || '' } : {}),
      }) });
      await refresh();
      S.screen = 'detail'; notify('Changes saved');
    } else {
      await api('purchases', { method:'POST', body: JSON.stringify({
        category: S.form.category, maker_id: S.form.makerId, price: S.form.price,
        quantity: S.form.qty, payment: S.form.payment, note: S.form.note, photo_url: S.draftPhoto || '',
      }) });
      await refresh();
      S.draftPhoto = null; S.screen = 'records'; notify('Purchase saved');
    }
    S.editingId = null;
  } catch (e) { notify(e.message); }
  S.busy = false; render();
}

}

  const hist = r.history.length
    ? '<div class="hist"><p class="ht">Edit history</p><div class="line">' +
        '<div style="position:relative;"><div class="cur-dot"></div><p class="cv1">Current version</p><p class="cv2">' + (r.updatedTs ? fmtDate(r.updatedTs) + ', ' + fmtTime(r.updatedTs) : fmtDate(r.ts) + ', ' + fmtTime(r.ts)) + '</p></div>' +
        r.history.map((h, i) =>
          '<div style="position:relative;"><div class="old-dot"></div><div class="vcard">' +
            '<div class="vrow"><span class="vlab">Version ' + (r.history.length - i) + '</span><span class="vdate">' + fmtDate(h.ts) + ', ' + fmtTime(h.ts) + '</span></div>' +
            '<p class="vsum">' + esc(h.category) + ' &middot; ' + money(h.price) + ' &middot; Qty ' + h.qty + ' &middot; ' + esc(h.payment) + (h.maker ? ' &middot; ' + esc(h.maker) : '') + '</p>' +
            (h.note ? '<p class="vnote">&ldquo;' + esc(h.note) + '&rdquo;</p>' : '') +
          '</div></div>').join('') +
      '</div></div>'
    : '';
  return '<div class="screen">' +
    '<div class="form-head"><button class="back-btn" aria-label="Back" onclick="go(S.backTo)">' + I.back + '</button><h1>Purchase</h1></div>' +
    '<div class="form-scroll">' +
      '<div class="det-photo ph">' + (r.photo ? '<img src="' + r.photo + '" alt="">' : '<span class="np">no photo captured</span>') + '</div>' +
      '<div class="det-head"><p class="cat">' + esc(r.category) + '</p><p class="price">' + money(r.price * r.qty) + '</p></div>' +
      '<div class="info-card">' + infoRows + '</div>' +
      (r.note ? '<div class="note-block"><p class="nl">Note</p><p class="nt">' + esc(r.note) + '</p></div>' : '') +
      '<button class="edit-btn" onclick="editRecord()">' + I.edit + 'Edit purchase</button>' +
      hist +
      (REQD.has(r.id)
        ? '<div class="req-note">Delete request sent — waiting for admin approval.</div>'
        : S.confirmDelete
        ? '<div class="del-confirm"><p>Ask the admin to delete this purchase? It stays visible until they approve.</p><div class="btns"><button class="c" onclick="S.confirmDelete=false;render()">Cancel</button><button class="d" onclick="requestDelete()">Request delete</button></div></div>'
        : '<button class="del-btn" onclick="S.confirmDelete=true;render()">' + I.trash + 'Request delete</button>') +
    '</div>' +
  '</div>';
}

function drawerView() {
  return '<div class="drawer-wrap">' +
    '<div class="scrim" onclick="S.menuOpen=false;render()"></div>' +
    '<div class="drawer">' +
      '<div class="dh"><div><p class="dw1">' + SHOP + '</p><p class="dw2">Product capture</p></div>' +
      '<button class="dx" aria-label="Close" onclick="S.menuOpen=false;render()">' + I.x('#2b2622') + '</button></div>' +
      '<button class="d-item" onclick="go(\'home\')">' + I.home + '<span>Home</span></button>' +
      '<button class="d-item" onclick="go(\'records\')">' + I.records + '<span>Purchases</span></button>' +
      '<button class="d-item pink" onclick="startCapture()">' + I.cam(22) + '<span>New capture</span></button>' +
      '<div style="flex:1;"></div>' +
      '<button class="d-item red" onclick="signOut()">' + I.out + '<span>Sign out (' + esc(S.employee.name) + ')</span></button>' +
      '<p class="d-note">Employees sign in with their own passkey. Passkeys are managed from the admin console.</p>' +
    '</div>' +
  '</div>';
}

function render() {
  const f = $('#frame');
  if (!S.booted) { f.innerHTML = ''; return; }
  let html = '';
  if (!S.employee) html = gateView();
  else if (S.screen === 'home') html = homeView();
  else if (S.screen === 'capture') html = captureView();
  else if (S.screen === 'form') html = formView();
  else if (S.screen === 'records') html = recordsView();
  else if (S.screen === 'detail') html = detailView();
  else html = homeView();
  if (S.menuOpen && S.employee) html += drawerView();
  if (S.toast) html += '<div class="toast">' + I.check + esc(S.toast) + '</div>';
  f.innerHTML = html;
  if (S.screen === 'capture' && stream) { const v = $('#vid'); if (v) { v.srcObject = stream; $('#capOff').style.display = 'none'; } }
}

document.getElementById('fileIn').addEventListener('change', onFile);
boot();
</script>
</body>
</html>
