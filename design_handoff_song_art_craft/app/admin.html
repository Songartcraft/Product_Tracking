<script>
const CUR = '£';

const S = {
  booted: false, admin: null,
  tab: 'overview',
  adminId: '', loginError: '', shake: false,
  employees: [], makers: [], purchases: [], categories: [], admins: [], deleteRequests: [],
  shopName: 'Song Art & Craft', logoUrl: '',
  filter: 'All', makerFilter: 'All', empFilter: 'All',
  sort: { key: 'date', dir: 'desc' },
  newMaker: '', makerEditId: null,
  catEditId: null,
  empModalOpen: false, empEditingId: null, ef: null, efError: '',
  empConfirmId: null,
  revealed: {},
  detailOpen: false, detailId: null, pf: null, pdConfirmDelete: false,
  toast: '',
};
let toastTimer = null;

const $ = s => document.querySelector(s);
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const jsq = s => esc(s).replace(/'/g, "\\'");
const money = n => CUR + Number(n || 0).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = ts => new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
const fmtTime = ts => new Date(ts).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
const isToday = ts => new Date(ts).toDateString() === new Date().toDateString();

async function api(path, opts = {}) {
  const r = await fetch('/api/' + path, { credentials:'same-origin', headers:{ 'content-type':'application/json' }, ...opts });
  let j = null; try { j = await r.json(); } catch (e) {}
  if (!r.ok) throw new Error((j && j.error) || 'Request failed');
  return j;
}
function mapPurchase(p) {
  return {
    id: p.id, photo: p.photo_url || null, category: p.category,
    price: Number(p.price), qty: p.quantity, payment: p.payment, note: p.note || '',
    makerId: p.maker_id, maker: (p.makers && p.makers.name) || S.shopName,
    employee: p.employees ? (p.employees.first_name + ' ' + p.employees.last_name) : '—',
    ts: new Date(p.created_at).getTime(),
    updatedTs: p.updated_at ? new Date(p.updated_at).getTime() : null,
    history: (p.purchase_history || []).map(h => ({
      ts: new Date(h.created_at).getTime(), category: h.category, price: Number(h.price),
      qty: h.quantity, payment: h.payment, note: h.note || '', maker: h.maker_name,
    })),
  };
}
async function boot() {
  try {
    const d = await api('bootstrap');
    S.categories = d.categories || [];
    S.shopName = d.shop_name || S.shopName;
    if (d.logo_url !== undefined) S.logoUrl = d.logo_url || '';
    if (d.session && d.session.t === 'admin') {
      S.admin = { id: d.session.id, email: d.session.email };
      applyData(d);
    }
  } catch (e) {}
  S.booted = true; render();
}
function applyData(d) {
  S.makers = d.makers || [];
  S.purchases = (d.purchases || []).map(mapPurchase);
  S.employees = d.employees || [];
  S.categories = d.categories || S.categories;
  S.shopName = d.shop_name || S.shopName;
  if (d.logo_url !== undefined) S.logoUrl = d.logo_url || '';
  S.admins = d.admins || S.admins;
  S.deleteRequests = d.delete_requests || [];
}
async function refresh() { applyData(await api('bootstrap')); }
function notify(msg) { clearTimeout(toastTimer); S.toast = msg; render(); toastTimer = setTimeout(() => { S.toast = ''; render(); }, 2600); }

async function saveEmp() {
  readEf();
  const ef = S.ef;
  if (!ef.first.trim() || !ef.last.trim()) { S.efError = 'First and last name are required.'; return render(); }
  if (!S.empEditingId && !/^\d{4,6}$/.test(ef.code)) { S.efError = 'Passkey must be 4 to 6 digits.'; return render(); }
  if (S.empEditingId && ef.code && !/^\d{4,6}$/.test(ef.code)) { S.efError = 'Passkey must be 4 to 6 digits.'; return render(); }
  try {
    if (S.empEditingId) {
      await api('admin/employees/' + S.empEditingId, { method:'PATCH', body: JSON.stringify({
        first_name: ef.first, last_name: ef.last, email: ef.email, phone: ef.phone,
        role: ef.role, status: ef.status, ...(ef.code ? { passkey: ef.code } : {}),
      }) });
      delete S.revealed[S.empEditingId];
    } else {
      await api('admin/employees', { method:'POST', body: JSON.stringify({
        first_name: ef.first, last_name: ef.last, email: ef.email, phone: ef.phone,
        passkey: ef.code, role: ef.role, status: ef.status,
      }) });
    }
    const wasEditing = !!S.empEditingId;
    await refresh();
    S.empModalOpen = false; S.efError = '';
    notify(wasEditing ? 'User updated' : 'User added');
  } catch (e) { S.efError = e.message; render(); }
}

function onLogoFile(ev) {
  const f = ev.target.files[0]; if (!f) return;
  const img = new Image();
  img.onload = async () => {
    const c = document.createElement('canvas');
    const scale = Math.min(1, 256 / Math.max(img.width, img.height));
    c.width = Math.round(img.width * scale); c.height = Math.round(img.height * scale);
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    const dataUrl = c.toDataURL('image/png');
    try {
      await api('admin/settings', { method:'PATCH', body: JSON.stringify({ logo_url: dataUrl }) });
      S.logoUrl = dataUrl; notify('Logo updated'); render();
    } catch (e) { notify(e.message); }
  };
  img.src = URL.createObjectURL(f);
  ev.target.value = '';
}

function sortBy(key) {
  if (S.sort.key === key) S.sort.dir = S.sort.dir === 'asc' ? 'desc' : 'asc';
  else S.sort = { key, dir: key === 'date' ? 'desc' : 'asc' };
  render();
}
function sortedList() {
  const list = S.purchases
    .filter(r => S.filter === 'All' || r.category === S.filter)
    .filter(r => S.makerFilter === 'All' || r.maker === S.makerFilter)
    .filter(r => S.empFilter === 'All' || r.employee === S.empFilter);
  const k = S.sort.key, dir = S.sort.dir === 'asc' ? 1 : -1;
  const val = r =>
    k === 'category' ? r.category.toLowerCase()
    : k === 'maker' ? r.maker.toLowerCase()
    : k === 'employee' ? r.employee.toLowerCase()
    : k === 'amount' ? r.price * r.qty
    : k === 'qty' ? r.qty
    : k === 'payment' ? r.payment
    : r.ts;
  return list.sort((a, b) => { const x = val(a), y = val(b); return x < y ? -dir : x > y ? dir : 0; });
}

function prodCell(r) {
  return '<div class="cell-prod">' +
    '<div class="thumb">' + (r.photo ? '<img src="' + r.photo + '" alt="">' : '') + '</div>' +
    '<div style="min-width:0;"><p class="cat">' + esc(r.category) + '</p>' + (r.updatedTs ? '<p class="edited">edited</p>' : '') + '</div>' +
  '</div>';
}

function overviewView() {
  const totalRev = S.purchases.reduce((a, r) => a + r.price * r.qty, 0);
  const today = S.purchases.filter(r => isToday(r.ts));
  const todayRev = today.reduce((a, r) => a + r.price * r.qty, 0);
  const activeEmp = S.employees.filter(e => e.status === 'Active').length;
  const stats = [
    ['Total revenue', money(totalRev), 'all recorded', '#d24d84'],
    ['Today', money(todayRev), today.length + ' captures', '#2b2622'],
    ['Purchases', String(S.purchases.length), 'total logged', '#2b2622'],
    ['Staff', String(activeEmp), 'active of ' + S.employees.length, '#2b2622'],
  ];
  return '<div class="stats-grid">' +
    stats.map(s => '<div class="stat-card"><p class="lab">' + s[0] + '</p><p class="val" style="color:' + s[3] + ';">' + s[1] + '</p><p class="sub">' + s[2] + '</p></div>').join('') +
    '</div>' +
    '<div class="panel">' +
      '<div class="panel-head"><h2>Recent purchases</h2><button class="link-btn" onclick="go(\'purchases\')">View all</button></div>' +
      S.purchases.slice(0, 5).map(r =>
        '<button class="trow g-recent" onclick="openDetail(\'' + r.id + '\')">' +
          '<div class="cell-prod"><div class="thumb" style="width:40px;height:40px;">' + (r.photo ? '<img src="' + r.photo + '" alt="">' : '') + '</div><span style="font-size:14px;font-weight:700;">' + esc(r.category) + '</span></div>' +
          '<span class="c-dim">' + esc(r.employee) + '</span>' +
          '<span style="font-size:14px;font-weight:700;color:#d24d84;">' + money(r.price * r.qty) + '</span>' +
          '<span class="c-dim">' + esc(r.payment) + '</span>' +
          '<span class="c-date" style="text-align:right;">' + fmtDate(r.ts) + '</span>' +
        '</button>').join('') +
    '</div>';
}

function employeesView() {
  return '<div class="panel">' +
    '<div class="thead g-emp"><span>Employee</span><span>Contact</span><span>Passkey</span><span>Role</span><span>Status</span><span style="text-align:right;">Actions</span></div>' +
    S.employees.map(e => {
      const rev = S.revealed[e.id];
      return '<div class="trow g-emp">' +
        '<div style="display:flex; align-items:center; gap:11px; min-width:0;">' +
          '<div class="emp-av">' + inits(e.first_name, e.last_name) + '</div>' +
          '<div style="min-width:0;"><p class="emp-name">' + esc(e.first_name + ' ' + e.last_name) + '</p></div>' +
        '</div>' +
        '<div style="min-width:0;"><p class="emp-mail">' + esc(e.email || '—') + '</p><p class="emp-phone">' + esc(e.phone || '') + '</p></div>' +
        '<div style="display:flex; align-items:center; gap:7px;"><span class="code">' + (rev !== undefined ? esc(rev) : '••••••') + '</span>' +
          '<button class="eye ' + (rev !== undefined ? 'on' : '') + '" aria-label="Reveal" onclick="toggleReveal(\'' + e.id + '\')">' + eye(rev !== undefined) + '</button></div>' +
        '<span class="c-dim">' + esc(e.role) + '</span>' +
        '<span class="pill ' + (e.status === 'Active' ? 'active' : 'inactive') + '">' + esc(e.status) + '</span>' +
        '<div style="display:flex; gap:8px; justify-content:flex-end;">' +
          '<button class="act-btn" aria-label="Edit" onclick="openEditEmp(\'' + e.id + '\')">' + IC.edit + '</button>' +
          '<button class="act-btn danger" aria-label="Delete" onclick="S.empConfirmId=\'' + e.id + '\';render()">' + IC.trash + '</button>' +
        '</div>' +
      '</div>';
    }).join('') +
  '</div>';
}

function makersView() {
  const counts = {};
  S.purchases.forEach(r => { counts[r.maker] = (counts[r.maker] || 0) + 1; });
  return '<div style="max-width:720px;">' +
    '<div class="maker-card">' +
      '<h2>Add a maker</h2>' +
      '<p class="sub">Names added here appear in the staff app&rsquo;s &ldquo;Made by&rdquo; dropdown. The default workshop is ' + esc(S.shopName) + '.</p>' +
      '<div class="maker-row">' +
        '<input id="newMaker" placeholder="Employee or maker name…" value="' + esc(S.newMaker) + '" onkeydown="if(event.key===\'Enter\')addMaker()">' +
        '<button class="maker-add" onclick="addMaker()">' + IC.plus16 + 'Add</button>' +
      '</div>' +
    '</div>' +
    '<div class="panel">' +
      '<div class="thead g-makers"><span>Maker</span><span>Attributed</span><span style="text-align:right;">Actions</span></div>' +
      S.makers.map(m =>
        '<div class="trow g-makers">' +
          (S.makerEditId === m.id
            ? '<div class="inline-edit"><div class="m-av">' + IC.flower17 + '</div>' +
              '<input id="makerEditIn" value="' + esc(m.name) + '" onkeydown="if(event.key===\'Enter\')saveMakerEdit();if(event.key===\'Escape\'){S.makerEditId=null;render()}">' +
              '<button class="mini-btn" onclick="saveMakerEdit()">Save</button>' +
              '<button class="mini-cancel" onclick="S.makerEditId=null;render()">Cancel</button></div>'
            : '<div style="display:flex; align-items:center; gap:11px;">' +
              '<div class="m-av">' + IC.flower17 + '</div>' +
              '<span class="m-name">' + esc(m.name) + '</span>' +
              (m.is_default ? '<span class="def-pill">Default</span>' : '') +
            '</div>') +
          '<span class="c-dim">' + (counts[m.name] || 0) + ' products</span>' +
          '<div style="display:flex; gap:8px; justify-content:flex-end;">' +
            '<button class="act-btn" aria-label="Rename" onclick="startMakerEdit(\'' + m.id + '\')">' + IC.edit + '</button>' +
            (m.is_default ? '' : '<button class="act-btn danger" aria-label="Remove" onclick="deleteMaker(\'' + m.id + '\')">' + IC.trash + '</button>') +
          '</div>' +
        '</div>').join('') +
    '</div>' +
  '</div>';
}

function purchasesView() {
  const makerNames = ['All', ...S.makers.map(m => m.name)];
  const empNames = ['All', ...S.employees.map(e => e.first_name + ' ' + e.last_name)];
  const list = sortedList();
  const th = (key, label, right) => {
    const on = S.sort.key === key;
    const arrow = on ? (S.sort.dir === 'asc' ? '&#9650;' : '&#9660;') : '';
    return '<span class="th-sort ' + (on ? 'on' : '') + '"' + (right ? ' style="justify-self:end;"' : '') + ' onclick="sortBy(\'' + key + '\')">' + label + (arrow ? ' <span style="font-size:9px;">' + arrow + '</span>' : '') + '</span>';
  };
  return '<div class="chips2"><span class="mlab">Category</span>' +
      ['All', ...catNames()].map(c => '<button class="chip ' + (S.filter === c ? 'on' : '') + '" onclick="S.filter=\'' + jsq(c) + '\';render()">' + esc(c) + '</button>').join('') +
    '</div>' +
    '<div class="chips2"><span class="mlab">Made by</span>' +
      makerNames.map(m => '<button class="chip ' + (S.makerFilter === m ? 'on' : '') + '" onclick="S.makerFilter=\'' + jsq(m) + '\';render()">' + esc(m) + '</button>').join('') +
    '</div>' +
    '<div class="chips2" style="margin-bottom:18px;"><span class="mlab">Employee</span>' +
      empNames.map(m => '<button class="chip ' + (S.empFilter === m ? 'on' : '') + '" onclick="S.empFilter=\'' + jsq(m) + '\';render()">' + esc(m) + '</button>').join('') +
    '</div>' +
    '<div class="panel">' +
      '<div class="thead g-purch">' +
        th('category', 'Product') + th('maker', 'Made by') + th('employee', 'Employee') +
        th('amount', 'Amount') + th('qty', 'Qty') + th('payment', 'Payment') + th('date', 'Date') +
        '<span style="text-align:right;">View</span>' +
      '</div>' +
      (list.length ? list.map(r =>
        '<button class="trow g-purch" onclick="openDetail(\'' + r.id + '\')">' +
          prodCell(r) +
          '<span class="c-maker">' + esc(r.maker) + '</span>' +
          '<span class="c-dim">' + esc(r.employee) + '</span>' +
          '<span class="c-price">' + money(r.price * r.qty) + '</span>' +
          '<span class="c-dim">' + r.qty + '</span>' +
          '<span class="c-dim">' + esc(r.payment) + '</span>' +
          '<span class="c-date">' + fmtDate(r.ts) + '</span>' +
          '<span style="text-align:right; color:#d24d84;">' + IC.chev + '</span>' +
        '</button>').join('')
      : '<div style="padding:32px 22px; text-align:center; color:#a89e92; font-size:14px;">No purchases match this filter.</div>') +
    '</div>';
}

function settingsView() {
  const counts = {};
  S.purchases.forEach(r => { counts[r.category] = (counts[r.category] || 0) + 1; });
  return '<div class="set-col">' +
    '<div class="set-card"><h2>Shop</h2><p class="sub">Name and logo shown across the console and the staff capture app.</p>' +
      '<label class="m-label">Shop name</label>' +
      '<div class="set-row"><input id="shopNameIn" value="' + esc(S.shopName) + '" onkeydown="if(event.key===\'Enter\')saveShopName()">' +
      '<button class="mini-btn" style="padding:13px 20px;" onclick="saveShopName()">Save</button></div>' +
      '<label class="m-label" style="margin-top:18px;">Company logo</label>' +
      '<div style="display:flex; align-items:center; gap:14px;">' +
        logoSvg(64) +
        '<button class="mini-btn" onclick="pickLogo()">Upload new logo</button>' +
        (S.logoUrl ? '<button class="mini-cancel" onclick="removeLogo()">Remove</button>' : '') +
      '</div>' +
      '<p class="set-note">Square images look best. It replaces the flower mark on the login screens and sidebar.</p></div>' +

    '<div class="set-card"><h2>Product categories</h2><p class="sub">Options staff choose from when logging a product. Renaming updates every existing purchase; a category in use can&rsquo;t be deleted.</p>' +
      S.categories.map(c =>
        '<div class="cat-row">' +
          (S.catEditId === c.id
            ? '<div class="inline-edit"><input id="catEditIn" value="' + esc(c.name) + '" onkeydown="if(event.key===\'Enter\')saveCatEdit();if(event.key===\'Escape\'){S.catEditId=null;render()}">' +
              '<button class="mini-btn" onclick="saveCatEdit()">Save</button>' +
              '<button class="mini-cancel" onclick="S.catEditId=null;render()">Cancel</button></div>'
            : '<span class="nm">' + esc(c.name) + '</span><span class="cnt">' + (counts[c.name] || 0) + ' purchases</span>' +
              '<button class="act-btn" aria-label="Rename" onclick="startCatEdit(\'' + c.id + '\')">' + IC.edit + '</button>' +
              '<button class="act-btn danger" aria-label="Delete" onclick="deleteCategory(\'' + c.id + '\')">' + IC.trash + '</button>') +
        '</div>').join('') +
      '<div class="set-row" style="margin-top:14px;"><input id="newCat" placeholder="New category name…" onkeydown="if(event.key===\'Enter\')addCategory()">' +
      '<button class="maker-add" onclick="addCategory()">' + IC.plus16 + 'Add</button></div></div>' +

    '<div class="set-card"><h2>My account</h2><p class="sub">Change the email or password you sign in with. You&rsquo;ll stay signed in.</p>' +
      '<div class="m-grid">' +
        '<div><label class="m-label">Email</label><input class="m-in" id="accEmail" type="email" value="' + esc(S.admin.email) + '"></div>' +
        '<div><label class="m-label">New password (min 8 chars)</label><input class="m-in" id="accPw" type="password" placeholder="Leave blank to keep current"></div>' +
      '</div>' +
      '<div class="m-btns" style="max-width:240px;"><button class="m-save" onclick="saveAccount()">Save changes</button></div></div>' +

    '<div class="set-card"><h2>Admin accounts</h2><p class="sub">Everyone listed here can sign in to this console with full access.</p>' +
      S.admins.map(a =>
        '<div class="adm-row"><div class="emp-av">' + esc((a.email || '?')[0].toUpperCase()) + '</div>' +
        '<span class="em">' + esc(a.email) + '</span>' +
        (a.id === S.admin.id ? '<span class="you-pill">You</span>'
          : '<button class="act-btn danger" aria-label="Remove" onclick="deleteAdmin(\'' + a.id + '\')">' + IC.trash + '</button>') +
        '</div>').join('') +
      '<div class="form2" style="margin-top:14px;">' +
        '<input id="newAdmEmail" type="email" placeholder="Email">' +
        '<input id="newAdmPw" type="password" placeholder="Password (min 8 chars)">' +
        '<button class="maker-add" onclick="addAdmin()">' + IC.plus16 + 'Add admin</button>' +
      '</div>' +
      '<p class="set-note">New admins have exactly the same permissions as you.</p></div>' +

    '<div class="set-card"><h2>Access</h2><p class="sub2">Administrators have full control: manage staff and passkeys, and view, edit or delete any purchase along with its full edit history.</p></div>' +
  '</div>';
}

function empModal() {
  const ef = S.ef;
  return '<div class="modal-wrap"><div class="scrim" onclick="closeEmp()"></div><div class="modal">' +
    '<div class="modal-head"><h2>' + (S.empEditingId ? 'Edit user' : 'Add user') + '</h2>' +
    '<button class="mx" aria-label="Close" onclick="closeEmp()">' + IC.x + '</button></div>' +
    '<div class="m-grid">' +
      '<div><label class="m-label">First name</label><input class="m-in" id="efFirst" value="' + esc(ef.first) + '"></div>' +
      '<div><label class="m-label">Last name</label><input class="m-in" id="efLast" value="' + esc(ef.last) + '"></div>' +
      '<div class="full"><label class="m-label">Email</label><input class="m-in" id="efEmail" type="email" value="' + esc(ef.email) + '"></div>' +
      '<div><label class="m-label">Phone</label><input class="m-in" id="efPhone" value="' + esc(ef.phone) + '"></div>' +
      '<div><label class="m-label">Passkey (4–6 digits)</label><input class="m-in mono" id="efCode" inputmode="numeric" maxlength="6" value="' + esc(ef.code) + '" placeholder="' + (S.empEditingId ? 'Unchanged' : '') + '"></div>' +
      '<div><label class="m-label">Role</label><div class="sel-wrap"><select class="m-in" id="efRole">' +
        '<option' + (ef.role === 'Employee' ? ' selected' : '') + '>Employee</option><option' + (ef.role === 'Manager' ? ' selected' : '') + '>Manager</option></select>' + IC.car + '</div></div>' +
      '<div><label class="m-label">Status</label><div class="sel-wrap"><select class="m-in" id="efStatus">' +
        '<option' + (ef.status === 'Active' ? ' selected' : '') + '>Active</option><option' + (ef.status === 'Inactive' ? ' selected' : '') + '>Inactive</option></select>' + IC.car + '</div></div>' +
    '</div>' +
    '<div class="m-err">' + (S.efError ? '<p>' + esc(S.efError) + '</p>' : '') + '</div>' +
    '<div class="m-btns"><button class="m-cancel" onclick="closeEmp()">Cancel</button>' +
    '<button class="m-save" onclick="saveEmp()">' + (S.empEditingId ? 'Save changes' : 'Add user') + '</button></div>' +
  '</div></div>';
}

function empConfirmModal() {
  const e = S.employees.find(x => x.id === S.empConfirmId);
  const name = e ? e.first_name + ' ' + e.last_name : '';
  return '<div class="modal-wrap" style="z-index:70;"><div class="scrim" onclick="S.empConfirmId=null;render()"></div><div class="confirm">' +
    '<h2>Remove ' + esc(name) + '?</h2>' +
    '<p>Their passkey stops working immediately. Purchases they logged are kept.</p>' +
    '<div class="m-btns" style="margin-top:0;"><button class="m-cancel" style="padding:13px;" onclick="S.empConfirmId=null;render()">Cancel</button>' +
    '<button class="c-remove" onclick="confirmEmpDelete()">Remove user</button></div>' +
  '</div></div>';
}

function slideOver() {
  const r = S.purchases.find(x => x.id === S.detailId);
  if (!r) return '';
  const pf = S.pf;
  const catOpts = [...new Set([...catNames(), pf.category])];
  const hist = r.history.length
    ? '<div class="hist"><p class="ht">Edit history</p><div class="line">' +
        '<div style="position:relative;"><div class="cur-dot"></div><p class="cv1">Current version</p><p class="cv2">' + (r.updatedTs ? fmtDate(r.updatedTs) + ', ' + fmtTime(r.updatedTs) : fmtDate(r.ts) + ', ' + fmtTime(r.ts)) + '</p></div>' +
        r.history.map((h, i) =>
          '<div style="position:relative;"><div class="old-dot"></div><div class="vcard">' +
            '<div class="vrow"><span class="vlab">Version ' + (r.history.length - i) + '</span><span class="vdate">' + fmtDate(h.ts) + ', ' + fmtTime(h.ts) + '</span></div>' +
            '<p class="vsum">' + esc(h.category) + ' &middot; ' + money(h.price) + ' &middot; Qty ' + h.qty + ' &middot; ' + esc(h.payment) + (h.maker ? ' &middot; ' + esc(h.maker) : '') + '</p>' +
          '</div></div>').join('') +
      '</div></div>'
    : '';
  return '<div class="so-wrap">' +
    '<div class="scrim" style="animation:ac-fade .16s ease; background:rgba(30,22,16,.45);" onclick="closeDetail()"></div>' +
    '<div class="so">' +
      '<div class="so-head"><h2>Purchase detail</h2><button class="mx" aria-label="Close" onclick="closeDetail()">' + IC.x + '</button></div>' +
      '<div class="so-body">' +
        '<div class="so-photo">' + (r.photo ? '<img src="' + r.photo + '" alt="">' : '<span class="np">no photo</span>') + '</div>' +
        '<label class="so-label">Category</label>' +
        '<div class="sel-wrap" style="margin-bottom:14px;"><select class="so-sel" id="pfCat">' +
          catOpts.map(c => '<option' + (pf.category === c ? ' selected' : '') + '>' + esc(c) + '</option>').join('') + '</select>' + IC.car + '</div>' +
        '<label class="so-label">Made by</label>' +
        '<div class="sel-wrap" style="margin-bottom:14px;"><select class="so-sel" id="pfMaker">' +
          S.makers.map(m => '<option value="' + m.id + '"' + (pf.makerId === m.id ? ' selected' : '') + '>' + esc(m.name) + '</option>').join('') + '</select>' + IC.car + '</div>' +
        '<div class="so-grid">' +
          '<div><label class="so-label">Price (' + CUR + ')</label><input class="so-in" id="pfPrice" type="number" value="' + esc(pf.price) + '" style="font-weight:600;"></div>' +
          '<div><label class="so-label">Quantity</label><input class="so-in" id="pfQty" type="number" min="1" value="' + pf.qty + '"></div>' +
        '</div>' +
        '<label class="so-label">Payment</label>' +
        '<div style="display:flex; gap:10px; margin-bottom:14px;">' +
          '<button class="pay-btn ' + (pf.payment === 'Cash' ? 'on' : '') + '" onclick="setPay(\'Cash\')">Cash</button>' +
          '<button class="pay-btn ' + (pf.payment === 'Online' ? 'on' : '') + '" onclick="setPay(\'Online\')">Online</button>' +
        '</div>' +
        '<label class="so-label">Note</label>' +
        '<textarea class="so-in" id="pfNote" rows="2" style="resize:none; margin-bottom:8px;">' + esc(pf.note) + '</textarea>' +
        '<p class="so-meta">Logged by <strong>' + esc(r.employee) + '</strong> &middot; ' + fmtDate(r.ts) + ', ' + fmtTime(r.ts) + '</p>' +
        '<div class="so-btns">' +
          '<button class="so-save" onclick="savePurchase()">Save changes</button>' +
          (S.pdConfirmDelete ? '' : '<button class="so-del" onclick="S.pdConfirmDelete=true;readPf();render()">Delete</button>') +
        '</div>' +
        (S.pdConfirmDelete
          ? '<div class="so-confirm"><p>Delete this purchase permanently?</p><div class="btns">' +
            '<button class="c" onclick="S.pdConfirmDelete=false;render()">Cancel</button>' +
            '<button class="d" onclick="confirmPurchaseDelete()">Delete</button></div></div>'
          : '') +
        hist +
      '</div>' +
    '</div>' +
  '</div>';
}

function render() {
  const root = $('#root');
  if (!S.booted) { root.innerHTML = ''; return; }
  let html = '';
  if (!S.admin) {
    html = loginView();
  } else {
    const t = TITLES[S.tab];
    html = '<div class="shell">' + sidebar() +
      '<main><header><div><h1>' + t[0] + '</h1><p class="sub">' + t[1] + '</p></div>' +
      (S.tab === 'employees' ? '<button class="add-btn" onclick="openAddEmp()">' + IC.plus + 'Add user</button>' : '') +
      '</header><div class="content">' +
      (S.tab === 'overview' ? overviewView()
        : S.tab === 'employees' ? employeesView()
        : S.tab === 'makers' ? makersView()
        : S.tab === 'purchases' ? purchasesView()
        : S.tab === 'requests' ? requestsView()
        : settingsView()) +
      '</div></main></div>';
    if (S.empModalOpen) html += empModal();
    if (S.empConfirmId) html += empConfirmModal();
    if (S.detailOpen) html += slideOver();
  }
  if (S.toast) html += '<div class="toast">' + IC.check + esc(S.toast) + '</div>';
  root.innerHTML = html;
  const pw = $('#adminPw');
  if (pw) pw.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
}

document.getElementById('logoIn').addEventListener('change', onLogoFile);
boot();
</script>
</body>
</html>
